name: kariyer_koprusu_app
description: "Kariyer Köprüsü - Öğrenci ve Şirket Kariyer Platformu"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & API
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.6.2

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  percent_indicator: ^4.2.3
  timeago: ^3.7.0

  # File picker for CV upload
  file_picker: ^8.1.7

  # Local storage
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1B1B4B"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
